name: Spring Boot CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-docker:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Java 21
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Step 3: Build Spring Boot project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 4: Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 5: Build Docker image with Docker Hub repo name
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/taskmanagementapi:latest .

      # Step 6: Push Docker image to Docker Hub
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/taskmanagementapi:latest